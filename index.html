<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DEEJAY ODEE</title>
<link rel="icon" type="image/png" href="Favicon.png">
  
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a1a1a, #0a0a0a 60%);
  color: #fff;
  overflow: hidden;
}

/* subtle grain overlay */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image: url("https://www.transparenttextures.com/patterns/asfalt-dark.png");
  opacity: 0.15;
  pointer-events: none;
}

.container {
  text-align: center;
  width: 100%;
  max-width: 420px;
  padding: 30px;
}

@media (max-width: 768px) {
  .container {
    max-width: 95vw;
    min-height: 85vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 25px;
  }
}

.profile {
  margin-bottom: 25px;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  background: linear-gradient(145deg, #ff00cc, #3333ff);
  margin: 0 auto 15px;
  box-shadow: 0 0 25px rgba(255, 0, 204, 0.25);
}

h1 {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 1px;
}

p {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 5px;
}

.links {
  margin-top: 25px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

a {
  text-decoration: none;
  color: white;
  padding: 14px;
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(10px);
  transition: 0.25s ease;
  font-weight: 500;
  letter-spacing: 0.3px;
}

a:hover {
  transform: translateY(-2px);
  background: rgba(255, 255, 255, 0.12);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
}

.footer {
  margin-top: 20px;
  font-size: 11px;
  opacity: 0.4;
}
</style>
</head>

<body>

<div class="container">

  <div class="profile">
    <img src="favicon.png" class="avatar"></img>
    <h1>DEEJAY ODEE</h1>
    <p>Dancehall • Afrobeats • Afroswing • Amapiano • UKG • EDM • House • R&B</p>
  </div>

  <div class="links">
    <a href="#">🎧 Latest Mix</a>
    <a href="https://soundcloud.djodee.co.uk">🎵 SoundCloud</a>
    <a href="#">📺 YouTube Sets</a>
    <a href="https://instagram.djodee.co.uk">📸 Instagram</a>
    <a href="mailto:bookings@djodee.co.uk">📩 Bookings / Contact</a>
  </div>

  <div class="footer">
    © 2026 DJ ODEE
  </div>

</div>

</body>
</html>
